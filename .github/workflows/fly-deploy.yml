name: Fly Deploy

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "web/**"
      - "deploy/fly/**"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch:

jobs:
  check-token:
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.t.outputs.has_token }}
    steps:
      - id: t
        run: |
          if [ -n "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: check-token
    if: needs.check-token.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: tama-auth
            cfg: deploy/fly/fly.auth.toml
          - app: tama-pet
            cfg: deploy/fly/fly.pet.toml
          - app: tama-social
            cfg: deploy/fly/fly.social.toml
          - app: tama-notif
            cfg: deploy/fly/fly.notif.toml
          - app: tama-gateway
            cfg: deploy/fly/fly.gateway.toml
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c ${{ matrix.cfg }} -a ${{ matrix.app }} --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  web:
    needs: [check-token, deploy]
    if: needs.check-token.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy -c deploy/fly/fly.web.toml -a tama-web --remote-only \
            --build-arg VITE_API_URL=https://tama-gateway.fly.dev
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
