name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc: [auth, pet, social, notif, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Tidy
        working-directory: services/${{ matrix.svc }}
        run: go mod tidy
      - name: Vet
        working-directory: services/${{ matrix.svc }}
        run: go vet ./...
      - name: Build
        working-directory: services/${{ matrix.svc }}
        run: go build -o /tmp/${{ matrix.svc }}-bin ./cmd
      - name: Test
        working-directory: services/${{ matrix.svc }}
        run: go test ./... -count=1

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
