services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [gateway, web]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../services/auth/migrations:/migrations/auth:ro
      - ../../services/pet/migrations:/migrations/pet:ro
      - ../../services/social/migrations:/migrations/social:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      SERVICE_PORT: 8081
    depends_on:
      postgres: { condition: service_healthy }

  pet:
    build:
      context: ../..
      dockerfile: services/pet/Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      SERVICE_PORT: 8082
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  social:
    build:
      context: ../..
      dockerfile: services/social/Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      SERVICE_PORT: 8083
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  notif:
    build:
      context: ../..
      dockerfile: services/notif/Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      SERVICE_PORT: 8084
    depends_on:
      redis: { condition: service_healthy }

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      SERVICE_PORT: 8080
      AUTH_URL:   http://auth:8081
      PET_URL:    http://pet:8082
      SOCIAL_URL: http://social:8083
      NOTIF_URL:  http://notif:8084
      CORS_ORIGINS: ${PUBLIC_WEB_URL}
    depends_on: [auth, pet, social, notif]

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
