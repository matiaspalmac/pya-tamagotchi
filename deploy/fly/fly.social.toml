app = "tama-social"
primary_region = "scl"

[build]
  dockerfile = "../../services/social/Dockerfile"

[env]
  SERVICE_PORT  = "8083"
  POSTGRES_PORT = "5432"
  LOG_LEVEL     = "info"

[[services]]
  internal_port = 8083
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 8083

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
