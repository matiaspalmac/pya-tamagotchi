app = "tama-gateway"
primary_region = "scl"

[build]
  dockerfile = "../../services/gateway/Dockerfile"

[env]
  SERVICE_PORT  = "8080"
  AUTH_URL      = "http://tama-auth.flycast:8081"
  PET_URL       = "http://tama-pet.flycast:8082"
  SOCIAL_URL    = "http://tama-social.flycast:8083"
  NOTIF_URL     = "http://tama-notif.flycast:8084"
  CORS_ORIGINS  = "https://tama-web.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
