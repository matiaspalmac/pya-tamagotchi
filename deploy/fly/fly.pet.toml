app = "tama-pet"
primary_region = "scl"

[build]
  dockerfile = "../../services/pet/Dockerfile"

[env]
  SERVICE_PORT      = "8082"
  POSTGRES_PORT     = "5432"
  TICK_INTERVAL_SEC = "30"
  LOG_LEVEL         = "info"

[[services]]
  internal_port = 8082
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 8082

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
