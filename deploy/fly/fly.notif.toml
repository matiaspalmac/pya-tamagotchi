app = "tama-notif"
primary_region = "scl"

[build]
  dockerfile = "../../services/notif/Dockerfile"

[env]
  SERVICE_PORT = "8084"
  LOG_LEVEL    = "info"

# Notif sirve WS interno; gateway lo proxea
[[services]]
  internal_port = 8084
  protocol = "tcp"
  auto_stop_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 8084

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
